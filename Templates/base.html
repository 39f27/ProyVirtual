<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>{% block title %}Gestión de Programas{% endblock %}</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      .logo {
        position: absolute;
        top: 10px;
        right: 10px;
        width: 150px;
        height: auto;
      }
    </style>
    <!-- Aquí puedes agregar más enlaces a CSS o recursos si lo necesitas -->
  </head>
  <body>
    <header>
      <!-- Menú de navegación (puedes personalizarlo aquí) -->
    </header>
    <img
      src="{{ url_for('static', filename='imaucla.jpg') }}"
      alt="Logo UCLA"
      class="logo"
    />
    <main>
      <div class="container mt-4">
        {% with messages = get_flashed_messages(with_categories=true) %} {% if
        messages %} {% for category, message in messages %}
        <div class="alert alert-{{ category }} alert-dismissible fade show">
          {{ message }}
          <button
            type="button"
            class="btn-close"
            data-bs-dismiss="alert"
            aria-label="Close"
          ></button>
        </div>
        {% endfor %} {% endif %} {% endwith %} {% block content %}{% endblock %}
      </div>
    </main>
    <footer class="text-center mt-5 mb-3">
      <!-- Pie de página (puedes personalizarlo aquí) -->
      <small
        >© {{ current_year|default(2025) }} Universidad Centroccidental Lisandro
        Alvarado</small
      >
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
